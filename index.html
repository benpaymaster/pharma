<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pharmafind | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 400px; border-radius: 12px; }
        .log-gradient { background: linear-gradient(180deg, rgba(30,41,59,1) 0%, rgba(15,23,42,1) 100%); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans">
    <div class="max-w-6xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-sky-400">pharmafind <span class="text-slate-500 text-sm font-mono">v1.0</span></h1>
            <div class="flex gap-4">
                <div class="bg-slate-900 border border-slate-800 px-4 py-2 rounded-lg">
                    <p class="text-xs text-slate-500 uppercase">Pharmacy A (Boots)</p>
                    <p class="font-mono text-sky-300">Active · Testnet</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div id="map" class="border border-slate-800"></div>
                
                <div class="bg-slate-900 border border-slate-800 p-6 rounded-xl">
                    <h2 class="text-xl font-semibold mb-4 text-white">Active Inventory Scanning</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-slate-950 rounded-lg border border-red-900/30">
                            <p class="text-red-400 font-bold">Amoxicillin</p>
                            <p class="text-sm text-slate-400">Low Stock: 4 units</p>
                        </div>
                        <div class="p-4 bg-slate-950 rounded-lg border border-yellow-900/30">
                            <p class="text-yellow-400 font-bold">Insulin</p>
                            <p class="text-sm text-slate-400">Expiry: 12 days</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden flex flex-col h-[600px]">
                <div class="p-4 border-b border-slate-800 bg-slate-800/50">
                    <h3 class="font-bold">Agentic Activity Feed</h3>
                </div>
                <div id="logs" class="p-4 space-y-3 overflow-y-auto flex-grow font-mono text-xs">
                    <div class="text-sky-400">[SYSTEM] Boots Agent initialized...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Setup Map
        const map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const bootsIcon = L.circleMarker([51.505, -0.09], { color: '#38bdf8', radius: 8 }).addTo(map).bindPopup('Boots Pharmacy');
        const hubIcon = L.circleMarker([51.52, -0.12], { color: '#fbbf24', radius: 10 }).addTo(map).bindPopup('Regional Supply Hub');

        // Simulated Live Stream of your Terminal Logs
        function addLog(msg, type = 'info') {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            const color = type === 'success' ? 'text-green-400' : type === 'warn' ? 'text-yellow-400' : 'text-slate-400';
            div.className = color;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.prepend(div);
        }

        // The "Script" for your video demo
        setTimeout(() => addLog("📡 Scanning local inventory...", 'info'), 1000);
        setTimeout(() => addLog("⚠️ ALERT: Amoxicillin critically low.", 'warn'), 3000);
        setTimeout(() => addLog("💰 x402 Request: Paying 0.01 XLM for stock data...", 'info'), 5000);
        setTimeout(() => addLog("✅ Payment Hash: b6610b58... Verified!", 'success'), 7000);
        setTimeout(() => addLog("📦 Supplier: Warehouse-South-1 unlocked.", 'success'), 8500);
    </script>
</body>
</html>
